<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaron Kilburg — Bridge Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:  #0D1B2A;
      --navy:  #1B3A5C;
      --amber: #C8822A;
      --amber-light: #E09A46;
      --cream: #F4EAD5;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,130,42,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,130,42,0.06) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    .gate-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 3rem 2.5rem 2.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      position: relative; z-index: 1;
    }
    .gate-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .gate-logo-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem; font-weight: 900;
      line-height: 0.9; color: #fff;
      letter-spacing: 0.02em;
    }
    .gate-logo-name span { color: var(--amber); }
    .gate-logo-bar {
      width: 40px; height: 2px;
      background: var(--amber);
      margin: 0.75rem auto 0;
    }
    .gate-eyebrow {
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center; margin-bottom: 0.4rem;
    }
    .gate-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      color: #fff; text-align: center;
      margin-bottom: 0.4rem;
    }
    .gate-sub {
      font-size: 0.82rem; color: rgba(255,255,255,0.35);
      text-align: center; margin-bottom: 2rem;
      line-height: 1.55;
    }
    label {
      display: block; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); margin-bottom: 0.5rem;
    }
    #pwInput {
      width: 100%; padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff;
      font-family: 'Barlow', sans-serif; font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 0.5rem;
    }
    #pwInput::placeholder { color: rgba(255,255,255,0.2); }
    #pwInput:focus { border-color: var(--amber); background: rgba(200,130,42,0.07); }
    #pwInput.error { border-color: #ef4444; animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    #gateError {
      font-size: 0.78rem; color: #f87171; font-weight: 600;
      margin-bottom: 1rem; display: none;
    }
    #gateError.visible { display: block; }
    #gateBtn {
      width: 100%; padding: 0.9rem;
      background: var(--amber); border: none; border-radius: 8px;
      color: #fff; font-family: 'Barlow', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    #gateBtn:hover:not(:disabled) { background: var(--amber-light); transform: translateY(-1px); }
    #gateBtn:disabled { opacity: 0.6; cursor: not-allowed; }
    .gate-footer {
      font-size: 0.65rem; color: rgba(255,255,255,0.2);
      text-align: center; margin-top: 2rem;
      letter-spacing: 0.1em;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    #gateBtn.loading .spinner { display: block; }
    #gateBtn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="gate-card">
    <div class="gate-logo">
      <div class="gate-logo-name">AARON<br><span>KILBURG</span></div>
      <div class="gate-logo-bar"></div>
    </div>
    <div class="gate-eyebrow">Private Access</div>
    <div class="gate-heading">Welcome Back</div>
    <p class="gate-sub">Enter your access password to continue.</p>
    <label for="pwInput">Password</label>
    <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password">
    <div id="gateError">Incorrect password — please try again.</div>
    <button id="gateBtn" onclick="unlock()">
      <span class="btn-text">Unlock →</span>
      <span class="spinner"></span>
    </button>
    <div class="gate-footer">Aaron Kilburg &nbsp;·&nbsp; Bridge Builder</div>
  </div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function unlock() {
  const pw    = document.getElementById('pwInput').value;
  const input = document.getElementById('pwInput');
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');

  if (!pw) return;

  btn.disabled = true;
  btn.classList.add('loading');
  err.classList.remove('visible');
  input.classList.remove('error');

  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );

    const ciphertext = new Uint8Array([
      ...b64ToBytes(PAYLOAD.data),
      ...b64ToBytes(PAYLOAD.tag)
    ]);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) },
      key,
      ciphertext
    );

    sessionStorage.setItem('ak_auth', pw);

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();

  } catch (e) {
    btn.disabled = false;
    btn.classList.remove('loading');
    input.classList.add('error');
    err.classList.add('visible');
    input.value = '';
    input.focus();
  }
}

(async () => {
  const saved = sessionStorage.getItem('ak_auth');
  if (saved) {
    document.getElementById('pwInput').value = saved;
    await unlock();
  }
})();

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
</script>
</body>
